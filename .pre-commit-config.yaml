# Pre-commit hook configuration.
# Install:
#   pre-commit install
# Run on the whole repo:
#   pre-commit run --all-files
#
# Versions are pinned. Bump with:
#   pre-commit autoupdate
# (Or let dependabot handle it — see .github/dependabot.yml.)

# Don't run on bun.lock / uv.lock — they're auto-generated and pre-commit
# would just fight the package managers.
exclude: |
  (?x)^(
    apps/web/bun\.lock|
    apps/api/uv\.lock|
    services/agent/uv\.lock
  )$

repos:
  # ─── File hygiene ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-yaml
        # docker-compose has multi-doc anchors and !-tags; allow them.
        args: [--allow-multiple-documents, --unsafe]
      - id: check-json
      - id: check-toml
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ─── Python: ruff (lint + format) ────────────────────────────────────────
  # Pinned to the same ruff version CI runs (.github/workflows/ci.yml).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.3
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ─── Secret scanning ─────────────────────────────────────────────────────
  # Catches hardcoded LiveKit API keys / JWTs / private keys in committed
  # files. Configured to scan only what's staged (default behaviour).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─── GitHub Actions linter ───────────────────────────────────────────────
  # Validates workflow YAML schema + shellchecks embedded `run:` blocks.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # ─── JSON Schema validation ──────────────────────────────────────────────
  # Validates dependabot.yml against the published schema; catches mistakes
  # that GitHub only surfaces at the next scheduled run.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.33.3
    hooks:
      - id: check-dependabot
        files: ^\.github/dependabot\.yml$
      - id: check-github-workflows
        files: ^\.github/workflows/.*\.ya?ml$
