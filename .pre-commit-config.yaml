# Pre-commit hook configuration.
# Install (run once per clone — both stages):
#   pre-commit install                        # pre-commit stage (every commit)
#   pre-commit install --hook-type pre-push   # pre-push stage (every push)
# Run on the whole repo:
#   pre-commit run --all-files
#   pre-commit run --all-files --hook-stage pre-push
#
# Stage policy:
#   - pre-commit stage: fast, stateless (format, lint, secret-scan, schema).
#     Runs on every `git commit`. Budget: <5s.
#   - pre-push stage: slower, catches logic regressions before CI.
#     Runs on every `git push`. Budget: ~30-60s per changed service.
#     Skip with:  SKIP=pytest-agent,pytest-api git push
#
# Versions are pinned. Bump with:
#   pre-commit autoupdate
# (Or let dependabot handle it — see .github/dependabot.yml.)

# Don't run on bun.lock / uv.lock — they're auto-generated and pre-commit
# would just fight the package managers.
# Don't run on infra/qwen3-tts-wrapper/ — vendored third-party source (pinned
# Apache-2.0 fork of dingausmwald/Qwen3-TTS-Openai-Fastapi). Keeping it
# byte-for-byte identical to the upstream commit SHA preserves the ability
# to re-diff against upstream and apply local patches surgically.
exclude: |
  (?x)^(
    apps/web/bun\.lock|
    apps/api/uv\.lock|
    services/agent/uv\.lock|
    infra/qwen3-tts-wrapper/.*
  )$

repos:
  # ─── File hygiene ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-yaml
        # docker-compose has multi-doc anchors and !-tags; allow them.
        args: [--allow-multiple-documents, --unsafe]
      - id: check-json
      - id: check-toml
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # ─── Python: ruff (lint + format) ────────────────────────────────────────
  # Pinned to the same ruff version CI runs (.github/workflows/ci.yml).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.3
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ─── Secret scanning ─────────────────────────────────────────────────────
  # Catches hardcoded LiveKit API keys / JWTs / private keys in committed
  # files. Configured to scan only what's staged (default behaviour).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─── GitHub Actions linter ───────────────────────────────────────────────
  # Validates workflow YAML schema + shellchecks embedded `run:` blocks.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # ─── JSON Schema validation ──────────────────────────────────────────────
  # Validates dependabot.yml against the published schema; catches mistakes
  # that GitHub only surfaces at the next scheduled run.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.33.3
    hooks:
      - id: check-dependabot
        files: ^\.github/dependabot\.yml$
      - id: check-github-workflows
        files: ^\.github/workflows/.*\.ya?ml$

  # ─── Pre-push: run service test suites ───────────────────────────────────
  # Catches logic regressions (like the Silero .to(device) bug merged on
  # 2026-04-22 where a mocked test encoded the wrong contract and let
  # silent-None-model ship to prod) BEFORE the push reaches CI. Scoped by
  # `files:` so only the service whose source changed pays the test cost.
  #
  # These require local dev deps installed:
  #   (cd services/agent && uv sync)
  #   (cd apps/api && uv sync)
  # and, for the API slow tests, a running Docker for the Postgres
  # testcontainer. Developers without Docker can skip with:
  #   SKIP=pytest-api git push
  - repo: local
    hooks:
      - id: pytest-agent
        name: pytest services/agent
        entry: bash -c 'cd services/agent && uv run pytest -q'
        language: system
        # Run when any .py changes under services/agent (src OR tests).
        # Excludes uv.lock / pyproject bumps — ruff-check catches
        # syntax, but actual test runs only matter on code changes.
        files: ^services/agent/.*\.py$
        pass_filenames: false
        stages: [pre-push]
      - id: pytest-api
        name: pytest apps/api
        entry: bash -c 'cd apps/api && uv run pytest -q'
        language: system
        files: ^apps/api/.*\.py$
        pass_filenames: false
        stages: [pre-push]
      - id: pytest-retriever
        name: pytest services/retriever
        # Slow tests (integration tests that spin pgvector/pgvector:pg18
        # containers via testcontainers) are deselected here — devs would
        # otherwise --no-verify around a 30-second pre-push. CI runs the
        # full suite (including -m slow) against a service container.
        # Exit 5 = "no tests collected"; treated as pass because today
        # every retriever test is slow-marked. Once Phase 3 lands
        # non-slow unit tests the hook starts enforcing them without
        # any config change.
        entry: bash -c 'cd services/retriever && uv run pytest -q -m "not slow"; c=$?; [ $c -eq 0 ] || [ $c -eq 5 ]'
        language: system
        files: ^services/retriever/.*\.py$
        pass_filenames: false
        stages: [pre-push]
