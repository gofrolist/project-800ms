# LiveKit server config — production / single-box deployment overlay.
#
# Differences from infra/livekit.yaml (dev):
#   - rtc.use_external_ip: true → LiveKit advertises the host's public IP in
#     ICE candidates, so browsers can reach it for WebRTC media. Required on
#     any NAT'd / cloud host.
#   - tcp_port stays at 7881; this is reached via the host network, NOT via
#     Caddy (Caddy can't proxy arbitrary TCP easily, and TCP is a fallback
#     for networks that block UDP — so this is only used when all else fails).
#   - turn.enabled is still false; add TURN/TLS on 5349 if you need to serve
#     users behind strict firewalls.
#
# Secrets stay out of this file. LIVEKIT_KEYS is injected via env from
# infra/.env in docker-compose.yml.

port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50099
  use_external_ip: true

log_level: info

turn:
  enabled: false

room:
  empty_timeout: 300
  max_participants: 4

# Webhook callbacks — LiveKit POSTs room_started / room_finished /
# participant_* events to the API so we can mark sessions as ended and
# record audio_seconds for billing. The JWT Authorization header on each
# request is signed with api_secret; the api container verifies using
# the same secret.
#
# api_key below MUST equal the LIVEKIT_API_KEY value from infra/.env —
# it picks which key/secret pair in the `keys` map to sign with. LiveKit
# doesn't do env-var substitution in its YAML, so this is a literal
# string. Rotate both in tandem if you change LIVEKIT_API_KEY.
webhook:
  api_key: coastalai-dev-key
  urls:
    # Internal docker network — Caddy isn't on this path, so LiveKit
    # talks to the api container directly.
    - http://api:8000/v1/livekit-webhook
