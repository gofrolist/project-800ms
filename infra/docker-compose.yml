# project-800ms full stack — dev + single-box prod use the same file.
#
# Prereqs (host):
#   - Docker + Compose v2
#   - NVIDIA Container Toolkit (`nvidia-ctk --version`)
#   - `nvidia-smi` reports your GPU
#
# Bring-up:
#   cp infra/.env.example infra/.env   # then edit
#   docker compose --env-file infra/.env -f infra/docker-compose.yml up -d
#
# Verify GPU wiring:
#   docker compose logs -f vllm        # wait for "Uvicorn running on http://0.0.0.0:8000"
#   curl http://localhost:8001/v1/models
#
# Notes:
#   - LiveKit needs a wide UDP range for WebRTC media. The range here (50000-50099)
#     is intentionally small for dev; widen to 50000-60000 in prod.
#   - On Linux, `network_mode: host` gives LiveKit the cleanest NAT behavior.
#     We use bridge + port mapping here for macOS/WSL compatibility. Switch to
#     host mode in prod by uncommenting the relevant line.
#   - All "internal" services (postgres, vllm) are bound to 127.0.0.1 on the
#     host so a misconfigured cloud security group can't expose them publicly.
#     Override LIVEKIT_DEV_FLAG, LOG_LEVEL, etc. in .env for local dev.

name: project-800ms

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Transport: LiveKit WebRTC SFU
  # ─────────────────────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:v1.11.0
    restart: unless-stopped
    # network_mode: host   # enable on Linux prod for best WebRTC behavior
    # `--dev` is OFF by default. It disables admin-API auth on port 7880
    # and is dangerous in any non-localhost deployment. Set
    # LIVEKIT_DEV_FLAG=--dev in your local .env if you need it for testing.
    command: ["--config", "/etc/livekit.yaml", "${LIVEKIT_DEV_FLAG:-}"]
    environment:
      # LiveKit reads keys from this env var (one per line, "key: secret").
      # Keeps secrets out of the committed livekit.yaml.
      # Quoted because YAML would otherwise parse the unquoted `: ` in the
      # middle of the value as a nested map and reject the file.
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      # Signaling/HTTP are intentionally bound to all interfaces — browsers
      # connect from outside the host network for WebRTC.
      - "7880:7880"               # signaling (HTTP/WS)
      - "7881:7881"               # TCP fallback for RTC
      - "50000-50099:50000-50099/udp"  # media
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # State
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-voice}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      # Loopback only — postgres has a password but should never be exposed
      # to the public internet. The api/agent containers reach it via the
      # internal docker network using the service name `postgres`.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voice} -d ${POSTGRES_DB:-voice}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────────────────────────────────────
  # GPU inference: vLLM (OpenAI-compatible)
  #
  # Model: Qwen2.5-7B-Instruct-AWQ — best multilingual 7B model,
  # strong Russian. ~4GB weights. gpu_memory_utilization=0.55 on
  # 24GB L4 → ~13GB for vLLM (weights + KV cache), leaving headroom
  # for Whisper (~2GB) + OS.
  # ─────────────────────────────────────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:v0.19.1
    restart: unless-stopped
    # Only start when the `local-llm` profile is active. Default stack skips
    # vllm and relies on an external LLM (LLM_BASE_URL). Opt in with:
    #   docker compose --profile local-llm up -d
    # OR set COMPOSE_PROFILES=local-llm in infra/.env.
    profiles: [local-llm]
    <<: *gpu
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_DISABLE_XET=1
    volumes:
      # Dedicated HF cache for vLLM. Don't share with the agent: different
      # UIDs would leave cache files unwritable for the other service.
      - hf_cache_vllm:/root/.cache/huggingface
    ports:
      # Loopback only — vLLM has no built-in rate limiting and (until the
      # api-key flag below) accepts arbitrary prompts. Reachable from the
      # agent container via the internal docker network on `vllm:8000`.
      - "127.0.0.1:8001:8000"
    # Private /dev/shm instead of `ipc: host` — sharing host IPC is a known
    # container-escape amplifier. 16 GB is plenty for single-GPU workloads.
    shm_size: "16gb"
    command:
      - Qwen/Qwen2.5-7B-Instruct-AWQ
      - --quantization=awq_marlin
      - --dtype=float16
      - --max-model-len=4096
      - --gpu-memory-utilization=0.55
      - --enable-prefix-caching
      - --served-model-name=qwen-7b
      - --host=0.0.0.0
      - --port=8000
      # Require an API key on every request — even on loopback. The agent
      # passes the same value via VLLM_API_KEY.
      - --api-key=${VLLM_API_KEY:?VLLM_API_KEY is required}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s  # model download + load can take minutes on first run

  # ─────────────────────────────────────────────────────────────────────────
  # GPU inference: Qwen3-TTS via vendored OpenAI-compat wrapper
  #
  # Sidecar that exposes Qwen3-TTS-0.6B-Base (Apache 2.0) through an
  # OpenAI /v1/audio/speech contract, so Pipecat's upstream
  # OpenAITTSService talks to it without custom agent-side code. The
  # wrapper source lives at ./qwen3-tts-wrapper/ — pinned to commit
  # eb14f6e, license-checked, structurally read through. See
  # infra/qwen3-tts-wrapper/README.md for the request contract and the
  # vendoring / patching playbook.
  #
  # Only starts when the `tts-qwen3` profile is active. Default stack
  # skips this sidecar (Piper / Silero don't need it). Opt in with:
  #   docker compose --profile tts-qwen3 up -d
  # OR set COMPOSE_PROFILES=tts-qwen3 in infra/.env.
  # ─────────────────────────────────────────────────────────────────────────
  qwen3-tts:
    build:
      context: ./qwen3-tts-wrapper
    restart: unless-stopped
    profiles: [tts-qwen3]
    <<: *gpu
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      # TTS_BACKEND=official uses the wrapper's plain PyTorch path. The
      # "optimized" default enables flash_attention_2 + compile +
      # cuda_graphs which speeds up steady-state throughput but adds
      # flakiness on driver/toolkit skew. We start with the simpler
      # backend for Unit 4 and flip to optimized in Unit 5 if bench
      # numbers justify it. See wrapper README "Failure modes".
      - TTS_BACKEND=official
      # Wire QWEN3_VARIANT from .env into the wrapper's TTS_MODEL_NAME
      # (api/config.py:26). Upstream's default model id points at the
      # maintainer's local filesystem — setting this ensures the sidecar
      # fetches the HuggingFace-hosted weights instead. Defaults to the
      # 0.6B variant we committed to in the plan (R8).
      - TTS_MODEL_NAME=${QWEN3_VARIANT:-0.6B-Base}
      - HOST=0.0.0.0
      # Agent-internal docker-network port. The host-side mapping below
      # (127.0.0.1:8002:8000) exists only for debugging curl from host.
      - PORT=8000
      # Bearer-token auth on /v1/audio/speech (local patch — wrapper
      # README "Local patches" §1). Empty disables auth; set to the same
      # value as QWEN3_TTS_API_KEY on the agent so Pipecat's OpenAI client
      # sends it via the Authorization header.
      - TTS_API_KEY=${QWEN3_TTS_API_KEY:-}
    volumes:
      # Dedicated HF cache for Qwen3-TTS. Don't share with hf_cache_agent
      # (GigaAM) or hf_cache_vllm — different UIDs inside each image would
      # leave cache files unwritable for the other service. The agent +
      # qwen3-tts sidecar even happen to both run as root here (different
      # images; matches the vllm service's rationale), but keeping caches
      # split makes the UID-sensitivity invariant robust against future
      # image changes.
      - hf_cache_qwen3:/root/.cache/huggingface
    ports:
      # Loopback only — the sidecar has no built-in rate limiting. The
      # agent reaches it via the internal docker network on
      # qwen3-tts:8000 (set QWEN3_TTS_BASE_URL=http://qwen3-tts:8000/v1).
      - "127.0.0.1:8002:8000"
    # Private /dev/shm — 4 GB is plenty for the 0.6B variant (vLLM uses
    # 16 GB for a 7B model). Bump if we flip QWEN3_VARIANT to 1.7B and
    # OOMs surface.
    shm_size: "4gb"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      # First boot pulls ~2 GB of Qwen3 weights from HF into hf_cache_qwen3
      # plus flash-attn wheel + optional warmup. 300s mirrors the vllm
      # service's first-boot tolerance; subsequent boots hit the cache.
      start_period: 300s

  # ─────────────────────────────────────────────────────────────────────────
  # Alembic migration init container.
  #
  # Runs `alembic upgrade head` against postgres and exits. The api service
  # waits for this to finish (service_completed_successfully) before
  # starting, so we never serve traffic against a stale schema. Idempotent:
  # running on an up-to-date DB is a no-op. Seed migrations upsert tenants
  # and only materialize API keys when SEED_*_API_KEY env vars are set.
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-voice}
      - SEED_DEMO_API_KEY=${SEED_DEMO_API_KEY:-}
      # These two aren't used by the migration itself, but Settings
      # validates them at import time and alembic imports settings.
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI: auth, sessions, LiveKit token minting
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-["*"]}
      - ENV=${ENV:-development}
      - AGENT_DISPATCH_URL=http://agent:8001
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-voice}
      - TENANT_CACHE_TTL_SECONDS=${TENANT_CACHE_TTL_SECONDS:-60}
      # Shared secret for /internal/* endpoints (agent -> api transcript
      # writes). Empty disables POST /internal/transcripts.
      - AGENT_INTERNAL_TOKEN=${AGENT_INTERNAL_TOKEN:-}
      # Master key for /v1/admin/* endpoints. Empty disables the admin
      # surface entirely (403 -> 503 agent_unavailable on first call).
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      # IP-based rate limits on unauth surfaces (defense-in-depth).
      # See infra/.env.example for tuning guidance.
      - ADMIN_IP_RATE_PER_MINUTE=${ADMIN_IP_RATE_PER_MINUTE:-60}
      - WEBHOOK_IP_RATE_PER_MINUTE=${WEBHOOK_IP_RATE_PER_MINUTE:-1000}
    ports:
      # Public — browsers POST /v1/sessions here. Rate-limited at the app
      # layer (slowapi).
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────────────────────────────────
  # Agent worker: Pipecat pipeline (VAD → Whisper → vLLM → Piper TTS)
  # Uses GPU for Faster-Whisper in-process.
  # ─────────────────────────────────────────────────────────────────────────
  agent:
    build:
      context: ../services/agent
      dockerfile: Dockerfile
      args:
        # Two-stage image strategy: heavy deps live in a separately-tagged
        # base image (services/agent/Dockerfile.base) that's rebuilt only
        # when pyproject.toml / uv.lock change. The app Dockerfile is a
        # thin COPY layer on top, so source-only rebuilds finish in seconds.
        # Build the base first (one-time, or after a dep change):
        #   docker build -f ../services/agent/Dockerfile.base \
        #     -t project-800ms-agent-base:local ../services/agent/
        # Override AGENT_BASE_IMAGE in infra/.env to pin a registry digest
        # in prod (e.g. ghcr.io/<owner>/project-800ms-agent-base@sha256:…).
        BASE_IMAGE: ${AGENT_BASE_IMAGE:-project-800ms-agent-base:local}
    restart: unless-stopped
    <<: *gpu
    environment:
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      - VLLM_BASE_URL=${LLM_BASE_URL:-http://vllm:8000/v1}
      - VLLM_MODEL=${LLM_MODEL:-qwen-7b}
      - VLLM_API_KEY=${LLM_API_KEY:?LLM_API_KEY is required}
      - TTS_VOICE=${TTS_VOICE:-ru_RU-denis-medium}
      # TTS engine selector — one of "piper" (default), "silero", "qwen3".
      # Must be wired through compose or the agent container never sees
      # env-file edits. The agent's AgentConfig validates the value at
      # construction time (services/agent/pipeline.py:AgentConfig).
      - TTS_ENGINE=${TTS_ENGINE:-piper}
      # Qwen3-TTS sidecar endpoint + API key. Only read when
      # TTS_ENGINE=qwen3; the agent factory raises ValueError if either
      # is empty at dispatch time (services/agent/tts_factory.py). Leave
      # unset on Piper / Silero deploys.
      - QWEN3_TTS_BASE_URL=${QWEN3_TTS_BASE_URL:-}
      - QWEN3_TTS_API_KEY=${QWEN3_TTS_API_KEY:-}
      - HF_HOME=/home/appuser/.cache/huggingface
      - HF_HUB_DISABLE_XET=1
      - PIPER_VOICES_DIR=/home/appuser/.cache/piper
      # Transcript persistence: when both set, the agent POSTs finalized
      # STT/LLM utterances to the api's /internal/transcripts endpoint.
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
      - AGENT_INTERNAL_TOKEN=${AGENT_INTERNAL_TOKEN:-}
      # INFO by default — DEBUG logs full STT transcripts and LLM
      # prompts/completions, which is a privacy issue if exposed via
      # docker logs. Set LOG_LEVEL=DEBUG in .env when actively debugging.
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # No host port needed — API reaches agent via docker network (agent:8001).
    volumes:
      # Dedicated HF cache for the agent (GigaAM weights). See vllm.volumes
      # above for why this is split from the vllm cache.
      - hf_cache_agent:/home/appuser/.cache/huggingface
      - piper_voices:/home/appuser/.cache/piper
      # torch.hub cache for Silero v5 — the snakers4/silero-models repo
      # clone + ~200 MB of Russian v5 weights. Persisted across restarts
      # so agents with TTS_ENGINE=silero don't re-download on every boot.
      # Only read when Silero is the active engine (see main.py's
      # conditional preload); safe to leave mounted for Piper deployments
      # too, since the directory will just stay empty.
      - torch_cache_agent:/home/appuser/.cache/torch
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      # With TTS_ENGINE=silero the main.py preload does a torch.hub
      # clone (~200 MB) plus CUDA init before binding :8001 — we have
      # seen 5-60s on cold cache depending on network. 300s tolerates
      # that worst case; subsequent restarts hit torch_cache_agent and
      # finish in seconds. Mirrors the vllm + qwen3-tts start_period.
      start_period: 300s
    depends_on:
      livekit:
        condition: service_healthy
      # Optional — when the `local-llm` profile is off (external LLM via
      # LLM_BASE_URL), vllm is skipped and this dependency is ignored.
      # Requires docker compose >= 2.20 for `required: false`.
      vllm:
        condition: service_healthy
        required: false

volumes:
  pg_data:
  hf_cache_vllm:
  hf_cache_agent:
  hf_cache_qwen3:
  piper_voices:
  torch_cache_agent:
