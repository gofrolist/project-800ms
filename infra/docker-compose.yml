# project-800ms full stack — dev + single-box prod use the same file.
#
# Prereqs (host):
#   - Docker + Compose v2
#   - NVIDIA Container Toolkit (`nvidia-ctk --version`)
#   - `nvidia-smi` reports your GPU
#
# Bring-up:
#   cp infra/.env.example infra/.env   # then edit
#   docker compose --env-file infra/.env -f infra/docker-compose.yml up -d
#
# Verify GPU wiring:
#   docker compose logs -f vllm        # wait for "Uvicorn running on http://0.0.0.0:8000"
#   curl http://localhost:8001/v1/models
#
# Notes:
#   - LiveKit needs a wide UDP range for WebRTC media. The range here (50000-50099)
#     is intentionally small for dev; widen to 50000-60000 in prod.
#   - On Linux, `network_mode: host` gives LiveKit the cleanest NAT behavior.
#     We use bridge + port mapping here for macOS/WSL compatibility. Switch to
#     host mode in prod by uncommenting the relevant line.
#   - All "internal" services (postgres, vllm) are bound to 127.0.0.1 on the
#     host so a misconfigured cloud security group can't expose them publicly.
#     Override LIVEKIT_DEV_FLAG, LOG_LEVEL, etc. in .env for local dev.

name: project-800ms

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Transport: LiveKit WebRTC SFU
  # ─────────────────────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:v1.10.1
    restart: unless-stopped
    # network_mode: host   # enable on Linux prod for best WebRTC behavior
    # `--dev` is OFF by default. It disables admin-API auth on port 7880
    # and is dangerous in any non-localhost deployment. Set
    # LIVEKIT_DEV_FLAG=--dev in your local .env if you need it for testing.
    command: ["--config", "/etc/livekit.yaml", "${LIVEKIT_DEV_FLAG:-}"]
    environment:
      # LiveKit reads keys from this env var (one per line, "key: secret").
      # Keeps secrets out of the committed livekit.yaml.
      # Quoted because YAML would otherwise parse the unquoted `: ` in the
      # middle of the value as a nested map and reject the file.
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      # Signaling/HTTP are intentionally bound to all interfaces — browsers
      # connect from outside the host network for WebRTC.
      - "7880:7880"               # signaling (HTTP/WS)
      - "7881:7881"               # TCP fallback for RTC
      - "50000-50099:50000-50099/udp"  # media
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7880"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # State
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-voice}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      # Loopback only — postgres has a password but should never be exposed
      # to the public internet. The api/agent containers reach it via the
      # internal docker network using the service name `postgres`.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voice} -d ${POSTGRES_DB:-voice}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────────────────────────────────────
  # GPU inference: vLLM (OpenAI-compatible)
  #
  # Model: Qwen2.5-7B-Instruct-AWQ — best multilingual 7B model,
  # strong Russian. ~4GB weights. gpu_memory_utilization=0.55 on
  # 24GB L4 → ~13GB for vLLM (weights + KV cache), leaving headroom
  # for Whisper (~2GB) + OS.
  # ─────────────────────────────────────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:v0.19.0
    restart: unless-stopped
    # Only start when the `local-llm` profile is active. Default stack skips
    # vllm and relies on an external LLM (LLM_BASE_URL). Opt in with:
    #   docker compose --profile local-llm up -d
    # OR set COMPOSE_PROFILES=local-llm in infra/.env.
    profiles: [local-llm]
    <<: *gpu
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_DISABLE_XET=1
    volumes:
      # Dedicated HF cache for vLLM. Don't share with the agent: different
      # UIDs would leave cache files unwritable for the other service.
      - hf_cache_vllm:/root/.cache/huggingface
    ports:
      # Loopback only — vLLM has no built-in rate limiting and (until the
      # api-key flag below) accepts arbitrary prompts. Reachable from the
      # agent container via the internal docker network on `vllm:8000`.
      - "127.0.0.1:8001:8000"
    # Private /dev/shm instead of `ipc: host` — sharing host IPC is a known
    # container-escape amplifier. 16 GB is plenty for single-GPU workloads.
    shm_size: "16gb"
    command:
      - Qwen/Qwen2.5-7B-Instruct-AWQ
      - --quantization=awq_marlin
      - --dtype=float16
      - --max-model-len=4096
      - --gpu-memory-utilization=0.55
      - --enable-prefix-caching
      - --served-model-name=qwen-7b
      - --host=0.0.0.0
      - --port=8000
      # Require an API key on every request — even on loopback. The agent
      # passes the same value via VLLM_API_KEY.
      - --api-key=${VLLM_API_KEY:?VLLM_API_KEY is required}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s  # model download + load can take minutes on first run

  # ─────────────────────────────────────────────────────────────────────────
  # Alembic migration init container.
  #
  # Runs `alembic upgrade head` against postgres and exits. The api service
  # waits for this to finish (service_completed_successfully) before
  # starting, so we never serve traffic against a stale schema. Idempotent:
  # running on an up-to-date DB is a no-op. Seed migrations upsert tenants
  # and only materialize API keys when SEED_*_API_KEY env vars are set.
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-voice}
      - SEED_DEMO_API_KEY=${SEED_DEMO_API_KEY:-}
      # These two aren't used by the migration itself, but Settings
      # validates them at import time and alembic imports settings.
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI: auth, sessions, LiveKit token minting
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-["*"]}
      - ENV=${ENV:-development}
      - AGENT_DISPATCH_URL=http://agent:8001
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-voice}
      - TENANT_CACHE_TTL_SECONDS=${TENANT_CACHE_TTL_SECONDS:-60}
      # Shared secret for /internal/* endpoints (agent -> api transcript
      # writes). Empty disables POST /internal/transcripts.
      - AGENT_INTERNAL_TOKEN=${AGENT_INTERNAL_TOKEN:-}
      # Master key for /v1/admin/* endpoints. Empty disables the admin
      # surface entirely (403 -> 503 agent_unavailable on first call).
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
    ports:
      # Public — browsers POST /v1/sessions here. Rate-limited at the app
      # layer (slowapi).
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────────────────────────────────
  # Agent worker: Pipecat pipeline (VAD → Whisper → vLLM → Piper TTS)
  # Uses GPU for Faster-Whisper in-process.
  # ─────────────────────────────────────────────────────────────────────────
  agent:
    build:
      context: ../services/agent
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *gpu
    environment:
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      - VLLM_BASE_URL=${LLM_BASE_URL:-http://vllm:8000/v1}
      - VLLM_MODEL=${LLM_MODEL:-qwen-7b}
      - VLLM_API_KEY=${LLM_API_KEY:?LLM_API_KEY is required}
      - TTS_VOICE=${TTS_VOICE:-ru_RU-denis-medium}
      - HF_HOME=/home/appuser/.cache/huggingface
      - HF_HUB_DISABLE_XET=1
      - PIPER_VOICES_DIR=/home/appuser/.cache/piper
      # Transcript persistence: when both set, the agent POSTs finalized
      # STT/LLM utterances to the api's /internal/transcripts endpoint.
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
      - AGENT_INTERNAL_TOKEN=${AGENT_INTERNAL_TOKEN:-}
      # STT stack selection: "gigaam" (default, since 2026-04-19 A/B) or
      # "whisper" (rollback). Both are pre-loaded at startup regardless,
      # so the flip is a one-restart operation. See infra/.env.example
      # and docs/experiments/2026-04-19-stt-ab/phase-a-results.md.
      - STT_STACK=${STT_STACK:-gigaam}
      # INFO by default — DEBUG logs full STT transcripts and LLM
      # prompts/completions, which is a privacy issue if exposed via
      # docker logs. Set LOG_LEVEL=DEBUG in .env when actively debugging.
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # No host port needed — API reaches agent via docker network (agent:8001).
    volumes:
      # Dedicated HF cache for the agent (Faster-Whisper weights). See
      # vllm.volumes above for why this is split from the vllm cache.
      - hf_cache_agent:/home/appuser/.cache/huggingface
      - piper_voices:/home/appuser/.cache/piper
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    depends_on:
      livekit:
        condition: service_healthy
      # Optional — when the `local-llm` profile is off (external LLM via
      # LLM_BASE_URL), vllm is skipped and this dependency is ignored.
      # Requires docker compose >= 2.20 for `required: false`.
      vllm:
        condition: service_healthy
        required: false

volumes:
  pg_data:
  hf_cache_vllm:
  hf_cache_agent:
  piper_voices:
