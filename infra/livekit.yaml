# LiveKit server config — dev profile.
# Docs: https://docs.livekit.io/home/self-hosting/deployment/
#
# IMPORTANT: this file contains NO secrets. API key/secret pairs are
# injected via the LIVEKIT_KEYS environment variable in docker-compose.yml,
# sourced from infra/.env. Never add a `keys:` block here — it would commit
# credentials to git history.
#
# For prod: set `rtc.use_external_ip: true`, bind to the instance EIP,
# widen `port_range_end` to 60000, and set strict CORS in front of
# the signaling port.

port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50099
  use_external_ip: false

log_level: info

# Disable turn for dev — we're on localhost, no NAT to traverse.
turn:
  enabled: false

room:
  # Automatically close empty rooms after 5 minutes of inactivity.
  empty_timeout: 300
  # Max participants per room — low for a single-box MVP.
  max_participants: 4
