# TLS overlay — adds Caddy as a reverse proxy, the web SPA, and swaps the
# LiveKit config to advertise the public IP in ICE candidates.
#
# Apply on top of docker-compose.yml + docker-compose.prod.yml:
#
#   docker compose \
#     --env-file infra/.env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.prod.yml \
#     -f infra/docker-compose.tls.yml \
#     up -d
#
# Required env vars in infra/.env:
#   DOMAIN     — base domain (e.g. coastalai.ai). Caddy serves
#                ${DOMAIN} (SPA), api.${DOMAIN}, and livekit.${DOMAIN}.
#   TLS_EMAIL  — contact email for Let's Encrypt registration.
#
# DNS: create three A records pointing to the instance EIP:
#   ${DOMAIN}          -> <eip>
#   api.${DOMAIN}      -> <eip>
#   livekit.${DOMAIN}  -> <eip>

name: project-800ms

services:
  livekit:
    # Prod overlay advertises the public IP in ICE candidates.
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml:ro
    # Replace base ports entirely: drop 7880/7881 (Caddy fronts them on 443)
    # and keep only 50000-50099/udp (media bypasses Caddy).
    ports: !override
      - "50000-50099:50000-50099/udp"

  api:
    # Caddy hits api:8000 over the docker network — no host port needed.
    ports: !reset null

  web:
    # Published to GHCR by the docker-web CI job with a __API_URL__ placeholder
    # baked in. The container rewrites the placeholder at startup using the
    # API_URL env var below, so one image works for any deployment domain.
    #
    # The build: section is a fallback — if the image can't be pulled (e.g.
    # during initial CI rollout before the first push), compose will build
    # locally and tag it under the same name. Once CI publishes the image,
    # the pull path wins on subsequent deploys.
    image: ghcr.io/gofrolist/project-800ms-web:${IMAGE_TAG:-latest}
    build:
      context: ../apps/web
    environment:
      - API_URL=https://api.${DOMAIN:?DOMAIN is required when TLS is enabled}
      # Baked into the SPA at container start. Treat as public — the browser
      # exposes it in-page. Use a tenant with an origin allowlist scoped
      # tight to this deployment's domain.
      - API_KEY=${WEB_API_KEY:?WEB_API_KEY is required — rotate this tenant's key via the API to revoke}
    volumes:
      - web_dist:/dist

  caddy:
    image: caddy:2.11-alpine
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required when TLS is enabled}
      - TLS_EMAIL=${TLS_EMAIL:?TLS_EMAIL is required when TLS is enabled}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - web_dist:/srv/web:ro
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    depends_on:
      web:
        condition: service_completed_successfully
      api:
        condition: service_started
      livekit:
        condition: service_started
    healthcheck:
      # Hits the loopback-only :2020 site defined in Caddyfile.prod.
      # The public 80/443 listeners redirect HTTP → HTTPS, which fails
      # a plain wget probe against `localhost` (no cert for that name).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2020/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
  web_dist:
