# Sample Arizona-RP KB — bootstrap fixture for the in-scope eval (T022 / T028).
#
# This content is a STAND-IN for the operator-managed KB that US4's ingestion
# CLI (T057) will populate. It exists so the US1 eval harness can measure
# SC-001 (≥80 % top-3 recall on in-scope Russian queries) before the real
# operator pipeline ships.
#
# Content style: short, declarative, canonical — matches what a real
# Arizona-RP helper KB entry looks like. Content should NOT overlap across
# sections (the eval assumes each question maps to exactly one section).

entries:
  - key: driving_license
    title: Водительские права
    chunks:
      - section: Получение
        content: >-
          Чтобы получить водительские права категории B, нужно посетить
          автошколу на центральной площади города. Запишитесь у инструктора,
          пройдите теоретическое обучение и сдайте экзамен на вождение.
      - section: Стоимость
        content: >-
          Полный курс обучения в автошколе стоит 5 000 долларов. Пересдача
          экзамена — 500 долларов. Права выдаются сразу после успешной сдачи
          экзамена.
      - section: Экзамены
        content: >-
          Экзамен состоит из двух частей: теории и практики. Теория — тест
          из 20 вопросов, нужно правильно ответить минимум на 15. Практика —
          вождение по городу 15 минут в сопровождении инструктора.

  - key: vehicles
    title: Транспорт и автосалоны
    chunks:
      - section: Цены
        content: >-
          Грузовик Mule стоит 15 000 долларов. Легковой автомобиль Premier
          обойдётся в 12 500 долларов. Спортивная машина Sultan RS стоит
          180 000 долларов в автосалоне премиум-класса.
      - section: Аренда
        content: >-
          Арендовать автомобиль можно на 1, 3, 7 или 30 дней. Стоимость
          аренды Premier на сутки — 1 500 долларов, залог — 5 000 долларов.
          Залог возвращается при сдаче машины в целости.
      - section: Страховка
        content: >-
          Страховка автомобиля оформляется в любом страховом агентстве.
          Базовая страховка стоит 2 000 долларов в месяц и покрывает ремонт
          после ДТП. Без страховки полиция может оштрафовать на 10 000.

  - key: housing
    title: Жильё и недвижимость
    chunks:
      - section: Квартиры
        content: >-
          Квартиры доступны в разных районах города. Однокомнатная квартира
          в центре стоит 80 000 долларов на покупку или 3 000 долларов в
          месяц на аренду. Ключи передаёт риэлтор после подписания договора.
      - section: Дома
        content: >-
          Частные дома продаются только в элитных районах. Цена начинается
          от 500 000 долларов и зависит от района и площади. В доме можно
          поставить гараж и разместить до 4 автомобилей.
      - section: Хранилище
        content: >-
          В квартире и доме есть персональный шкаф для вещей и оружия.
          Шкаф защищён от взлома другими игроками. Максимальный вес —
          500 килограммов для квартиры, 2 000 килограммов для дома.

  - key: jobs
    title: Работа и профессии
    chunks:
      - section: Стартовые
        content: >-
          Новичкам доступны работы без лицензии: таксист, курьер, сборщик
          мусора, разносчик газет. Зарплата — от 200 до 800 долларов в час.
          Подходит для первого заработка сразу после регистрации персонажа.
      - section: Лицензированные
        content: >-
          Профессии с лицензией: медик, полицейский, механик, адвокат.
          Для устройства нужна лицензия соответствующего ведомства и
          5 уровень персонажа. Зарплата — от 1 500 до 4 000 долларов в час.
      - section: Фермерство
        content: >-
          Фермерская работа открывает уровни 1–10. Каждый уровень даёт
          новый инструмент и повышает зарплату. На 10 уровне доступен
          комбайн, зарплата — 3 500 долларов в час.

  - key: weapons
    title: Оружие и лицензии
    chunks:
      - section: Лицензия
        content: >-
          Лицензия на оружие стоит 10 000 долларов и оформляется в
          департаменте полиции с 5 уровня персонажа. Без лицензии хранение
          и ношение оружия запрещено и карается штрафом 15 000 долларов.
      - section: Покупка
        content: >-
          Оружие продаётся в оружейном магазине на окраине города.
          Пистолет Glock — 8 000, дробовик — 25 000, автомат — 120 000
          долларов. Для покупки нужна действующая лицензия и паспорт.
      - section: Патроны
        content: >-
          Патроны продаются там же, где оружие. Пачка пистолетных патронов
          (50 штук) стоит 500 долларов, пачка автоматных — 2 000 долларов.
          Максимальный запас — 500 патронов каждого типа на персонажа.

  - key: clans
    title: Клановая система
    chunks:
      - section: Вступление
        content: >-
          Чтобы вступить в клан, получите приглашение от лидера и
          подтвердите его через игровое меню. Одновременно можно состоять
          только в одном клане. Выход из клана оформляется через то же меню.
      - section: Создание
        content: >-
          Создать собственный клан можно с 15 уровня персонажа и балансом
          от 1 000 000 долларов. Лидер создаёт клан у чиновника мэрии,
          называет его и приглашает первых участников. Максимум — 50 человек.
      - section: Войны
        content: >-
          Клановые войны проходят раз в неделю в субботу. Кланы сражаются
          за территории, которые приносят пассивный доход. Побеждает клан
          с наибольшим количеством очков после двух часов боя.

  - key: banking
    title: Банк и финансы
    chunks:
      - section: Счёт
        content: >-
          Банковский счёт открывается бесплатно в любом отделении банка.
          На счёте деньги защищены от ограблений и смерти персонажа.
          Переводы между игроками — до 1 000 000 долларов за операцию.
      - section: Кредит
        content: >-
          Кредит можно взять с 5 уровня и положительным балансом. Базовая
          ставка — 10 процентов годовых. Просрочка выплаты приводит к
          штрафу и блокировке счёта до погашения долга.
      - section: Депозит
        content: >-
          Депозит открывается на срок от 1 до 12 месяцев. Ставка — от 5
          до 12 процентов годовых. Досрочное снятие возможно, но с потерей
          накопленных процентов.

  - key: medicine
    title: Медицина и здоровье
    chunks:
      - section: Больница
        content: >-
          Больница открыта круглосуточно. Осмотр у врача стоит 500 долларов,
          лечение тяжёлых ранений — до 10 000 долларов. Без денег
          лечат только при смертельных ранах.
      - section: Аптека
        content: >-
          Аптека продаёт бинты, аптечки и лекарства. Бинт восстанавливает
          10 процентов здоровья, аптечка — 50 процентов, адреналин снимает
          эффект оглушения. Максимум 5 предметов каждого типа.
      - section: Страховка
        content: >-
          Медицинская страховка оформляется в страховом агентстве.
          Стоимость — 3 000 долларов в месяц. Покрывает все расходы в
          больнице, включая реанимацию после смертельных ранений.

  - key: casino
    title: Казино и игры
    chunks:
      - section: Слоты
        content: >-
          Игровые автоматы принимают ставки от 10 до 10 000 долларов за
          вращение. Максимальный выигрыш — х1000 от ставки. Ограничение
          по проигрышу в день — 100 000 долларов на персонажа.
      - section: Рулетка
        content: >-
          Рулетка работает с 18:00 до 4:00. Минимальная ставка на цвет —
          100 долларов, на число — 1 000 долларов. Выигрыш на число
          выплачивается х35 к ставке.
      - section: Покер
        content: >-
          Покерные столы доступны с 21 уровня персонажа. Бай-ин в стол —
          от 5 000 до 500 000 долларов. В турнирах разыгрывается до
          5 миллионов долларов между восемью игроками.

  - key: transport_public
    title: Общественный транспорт
    chunks:
      - section: Автобусы
        content: >-
          Автобусы курсируют между районами города по расписанию.
          Одна поездка — 50 долларов. Работа водителем автобуса открыта
          после получения лицензии категории D за 8 000 долларов.
      - section: Такси
        content: >-
          Такси вызывается через телефон или ловится на улице. Стоимость
          поездки — от 100 до 800 долларов в зависимости от расстояния.
          Работа таксиста — стартовая, лицензия не нужна.
      - section: Метро
        content: >-
          Метро соединяет четыре района города. Одна поездка — 30 долларов.
          Проездной на месяц — 800 долларов, без ограничений по количеству
          поездок. Метро работает с 6:00 до 1:00.
