# Curated in-scope Russian eval set (T022).
#
# 50 questions, each tagged with the (kb_entry_key, section) it SHOULD
# retrieve from. Sourced against `sample_kb.yaml` in the same directory.
#
# Question style is deliberately varied:
#   - Direct keyword-match forms ("где купить оружие?")
#   - Paraphrases with no shared stems ("как получить права" vs
#     "как оформить водительское удостоверение?")
#   - Colloquial / noisy-STT forms ("а сколько стоит эта ваша автошкола")
#   - Follow-up-style (resolved by the rewriter against history in US3;
#     for US1 they should still retrieve on surface form alone)
#
# SC-001 gates at ≥80 % top-3 recall against this set.

